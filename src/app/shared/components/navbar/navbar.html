<nav class="navbar">
  <a class="navbar-brand" routerLink="/">ShopApp</a>

  <div class="navbar-links">
    <a routerLink="/products" routerLinkActive="active">Products</a>

    @if (authService.isAuthenticated()) {
      <a routerLink="/orders" routerLinkActive="active">My Orders</a>
      <span class="navbar-user">{{ authService.currentUser()?.email }}</span>
      <button class="btn-outline" (click)="authService.logout()">Sign out</button>
    } @else {
      <a routerLink="/auth/login" routerLinkActive="active">Sign in</a>
      <a routerLink="/auth/register" class="btn-primary">Register</a>
    }
  </div>
</nav>
